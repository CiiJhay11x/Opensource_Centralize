<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PISONET - Admin Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .header h1 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .status {
            display: flex;
            gap: 30px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status-item .label {
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
        }
        
        .status-item .value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
        }
        
        .card h3 {
            color: #333;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .stat-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
        }
        
        .stat-box:last-child {
            border-bottom: none;
        }
        
        .stat-label {
            color: #666;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
        }
        
        .login-form {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 10px;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin: 50px auto;
        }
        
        .login-form h2 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            color: #333;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s ease;
        }
        
        button:hover {
            transform: scale(1.02);
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        .admin-content {
            display: none;
        }
        
        .admin-content.active {
            display: block;
        }
        
        .client-list {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
            max-height: 600px;
            overflow-y: auto;
        }
        
        .client-item {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
            gap: 15px;
            padding: 15px;
            border-bottom: 1px solid #eee;
            align-items: center;
        }
        
        .client-item:last-child {
            border-bottom: none;
        }
        
        .client-item.header {
            font-weight: bold;
            background: #f0f0f0;
            border-radius: 5px;
        }
        
        .error {
            color: #d32f2f;
            background: #ffebee;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        
        .success {
            color: #388e3c;
            background: #e8f5e9;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        
        .loading {
            text-align: center;
            color: #666;
            padding: 20px;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .section {
            margin-top: 30px;
        }
        
        .logout-btn {
            background: #d32f2f;
            width: auto;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Form -->
        <div id="loginForm" class="login-form">
            <h2>🎮 PISONET Admin</h2>
            <div class="form-group">
                <label for="password">Admin Password:</label>
                <input type="password" id="password" placeholder="Enter admin password">
            </div>
            <button onclick="login()">Login</button>
            <div id="loginError"></div>
        </div>
        
        <!-- Admin Content -->
        <div id="adminContent" class="admin-content">
            <div class="header">
                <h1>🎮 PISONET Admin Dashboard</h1>
                <div class="status">
                    <div class="status-item">
                        <div class="label">Active Clients</div>
                        <div class="value" id="activeClients">-</div>
                    </div>
                    <div class="status-item">
                        <div class="label">Total Revenue</div>
                        <div class="value" id="totalRevenue">-</div>
                    </div>
                    <div class="status-item">
                        <div class="label">Coins Inserted</div>
                        <div class="value" id="totalCoins">-</div>
                    </div>
                </div>
            </div>
            
            <div class="dashboard">
                <div class="card">
                    <h3>📊 Statistics</h3>
                    <div class="stat-box">
                        <span class="stat-label">Online Clients:</span>
                        <span class="stat-value" id="statOnline">0</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">Total Clients:</span>
                        <span class="stat-value" id="statTotal">0</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">Total Revenue:</span>
                        <span class="stat-value" id="statRevenue">0</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">Transactions:</span>
                        <span class="stat-value" id="statTransactions">0</span>
                    </div>
                </div>
                
                <div class="card">
                    <h3>⚙️ Quick Actions</h3>
                    <div class="form-group">
                        <input type="text" id="clientIdInput" placeholder="Enter Client ID">
                    </div>
                    <div class="form-group">
                        <input type="number" id="creditAmount" placeholder="Credit Amount (minutes)">
                    </div>
                    <button onclick="addCredit()">Add Credit</button>
                    <button onclick="clearAllCredits()" style="background: #d32f2f; margin-top: 10px;">Clear All Credits (Emergency)</button>
                </div>
                
                <div class="card">
                    <h3>🔄 System</h3>
                    <button onclick="refreshStats()" style="margin-bottom: 10px;">Refresh Statistics</button>
                    <button onclick="testConnection()" style="background: #1976d2;">Test Connection</button>
                    <button onclick="logout()" class="logout-btn">Logout</button>
                </div>
            </div>
            
            <div class="client-list">
                <h3>👥 Connected Clients</h3>
                <div id="clientsList" class="loading">
                    <div class="spinner"></div>
                    <p>Loading clients...</p>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let adminPassword = '';
        let updateInterval;
        
        function login() {
            const password = document.getElementById('password').value;
            if (!password) {
                showError('Please enter password');
                return;
            }
            
            adminPassword = password;
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('adminContent').classList.add('active');
            
            refreshStats();
            updateInterval = setInterval(refreshStats, 5000);
        }
        
        function logout() {
            adminPassword = '';
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('adminContent').classList.remove('active');
            document.getElementById('password').value = '';
            clearInterval(updateInterval);
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('loginError');
            errorDiv.innerHTML = `<div class="error">${message}</div>`;
            setTimeout(() => {
                errorDiv.innerHTML = '';
            }, 5000);
        }
        
        function refreshStats() {
            fetch(`/api/admin/statistics?password=${adminPassword}`)
                .then(r => r.json())
                .then(data => {
                    document.getElementById('statOnline').textContent = data.active_clients || 0;
                    document.getElementById('statTotal').textContent = data.total_clients || 0;
                    document.getElementById('statRevenue').textContent = data.total_revenue || 0;
                    document.getElementById('statTransactions').textContent = data.total_coins || 0;
                    
                    document.getElementById('activeClients').textContent = data.active_clients || 0;
                    document.getElementById('totalRevenue').textContent = (data.total_revenue || 0) + ' ₱';
                    document.getElementById('totalCoins').textContent = data.total_coins || 0;
                })
                .catch(err => console.error('Stats error:', err));
            
            fetch(`/api/admin/clients?password=${adminPassword}`)
                .then(r => r.json())
                .then(clients => displayClients(clients))
                .catch(err => console.error('Clients error:', err));
        }
        
        function displayClients(clients) {
            const list = document.getElementById('clientsList');
            
            if (!clients || clients.length === 0) {
                list.innerHTML = '<p>No clients connected</p>';
                return;
            }
            
            let html = '<div class="client-item header"><strong>Client ID</strong><strong>Hostname</strong><strong>IP Address</strong><strong>Credit</strong><strong>Status</strong></div>';
            
            clients.forEach(client => {
                const credit = client.credit || 0;
                const status = client.banned ? '❌ Banned' : (client.status || 'online');
                html += `
                    <div class="client-item">
                        <small>${client.client_id}</small>
                        <small>${client.hostname}</small>
                        <small>${client.ip_address}</small>
                        <small><strong>${credit} min</strong></small>
                        <small>${status}</small>
                    </div>
                `;
            });
            
            list.innerHTML = html;
        }
        
        function addCredit() {
            const clientId = document.getElementById('clientIdInput').value;
            const amount = parseInt(document.getElementById('creditAmount').value);
            
            if (!clientId || !amount || amount <= 0) {
                showError('Invalid client ID or amount');
                return;
            }
            
            fetch('/api/add_credit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    admin_password: adminPassword,
                    client_id: clientId,
                    amount: amount
                })
            })
            .then(r => r.json())
            .then(data => {
                if (data.error) {
                    showError(data.error);
                } else {
                    alert(`✅ Added ${amount} minutes to ${clientId}`);
                    document.getElementById('clientIdInput').value = '';
                    document.getElementById('creditAmount').value = '';
                    refreshStats();
                }
            })
            .catch(err => showError('Error: ' + err));
        }
        
        function clearAllCredits() {
            if (!confirm('⚠️ Are you sure? This will clear ALL client credits!')) {
                return;
            }
            
            fetch('/api/clear_all_credits', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ admin_password: adminPassword })
            })
            .then(r => r.json())
            .then(data => {
                if (data.error) {
                    showError(data.error);
                } else {
                    alert('✅ All credits cleared');
                    refreshStats();
                }
            })
            .catch(err => showError('Error: ' + err));
        }
        
        function testConnection() {
            fetch('/api/status')
                .then(r => r.json())
                .then(data => {
                    alert(`✅ Server Online\n\nVersion: ${data.version}\nStatus: ${data.status}`);
                })
                .catch(err => alert('❌ Connection Failed: ' + err));
        }
        
        // Initial focus
        document.getElementById('password').focus();
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
